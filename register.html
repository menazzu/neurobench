<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroBench | Регистрация</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#050505',
                        surface: '#0c0c0c',
                        border: '#161616',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"Geist Mono"', 'monospace'],
                        title: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-tab { cursor: pointer; }
        .auth-tab.active { color: #fff; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
        .step-indicator .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.3s; }
        .step-indicator .step-dot.active { background: #fff; }
        .step-indicator .step-dot.done { background: rgba(255,255,255,0.4); }
        [data-step] { display: none; }
        [data-step].visible { display: block; }
        .invite-code-display { font-family: 'Geist Mono', monospace; letter-spacing: 0.3em; font-size: 1.5rem; }
    </style>
</head>
<body class="bg-black text-white antialiased min-h-screen flex items-center justify-center font-mono">

    <div class="w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 opacity-30 hover:opacity-100 transition-opacity">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center overflow-hidden">
                    <img src="logo.png" alt="N" class="w-5 h-5 object-contain">
                </div>
                <span class="font-bold tracking-tighter text-lg uppercase">NeuroBench</span>
            </a>
        </div>

        <!-- Tab Switch -->
        <div id="auth-tabs" class="flex gap-2 mb-6">
            <button class="auth-tab active flex-1 text-[10px] uppercase tracking-widest font-bold py-3 border border-border rounded-xl transition-all" data-tab="register">Регистрация</button>
            <button class="auth-tab flex-1 text-[10px] uppercase tracking-widest font-bold py-3 border border-border rounded-xl opacity-30 hover:opacity-60 transition-all" data-tab="login">Вход</button>
        </div>

        <!-- REGISTER PANEL -->
        <div id="panel-register" class="matte-card p-8">
            <div class="step-indicator flex justify-center gap-3 mb-8">
                <div class="step-dot active" data-step-dot="1"></div>
                <div class="step-dot" data-step-dot="2"></div>
                <div class="step-dot" data-step-dot="3"></div>
            </div>

            <!-- Step 1: Invite Code + Captcha -->
            <div data-step="1" class="visible">
                <h2 class="font-title text-lg uppercase tracking-widest text-center mb-6 text-shiny">Инвайт-код</h2>
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Код приглашения</label>
                        <input id="reg-invite-code" type="text" placeholder="XXXXXXXX" maxlength="8"
                            class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl font-mono uppercase tracking-widest text-center text-lg">
                        <p id="invite-code-error" class="text-red-400 text-xs mt-1 hidden"></p>
                    </div>
                    <div id="captcha-container" class="flex justify-center"></div>
                    <button id="reg-step1-btn"
                        class="w-full bg-white text-black py-3 text-[10px] uppercase tracking-widest font-bold rounded-full hover:scale-105 transition-transform disabled:opacity-30 disabled:hover:scale-100" disabled>
                        Далее
                    </button>
                </div>
            </div>

            <!-- Step 2: Email + Password -->
            <div data-step="2">
                <h2 class="font-title text-lg uppercase tracking-widest text-center mb-6 text-shiny">Аккаунт</h2>
                <form id="reg-step2-form" class="flex flex-col gap-4">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Email</label>
                        <input id="reg-email" type="email" placeholder="you@example.com" required
                            class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Пароль</label>
                        <input id="reg-password" type="password" placeholder="Минимум 6 символов" required minlength="6"
                            class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Подтвердите пароль</label>
                        <input id="reg-password-confirm" type="password" placeholder="Повторите пароль" required
                            class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl">
                    </div>
                    <p id="reg-step2-error" class="text-red-400 text-xs hidden"></p>
                    <button type="submit"
                        class="w-full bg-white text-black py-3 text-[10px] uppercase tracking-widest font-bold rounded-full hover:scale-105 transition-transform disabled:opacity-30 disabled:hover:scale-100">
                        Зарегистрироваться
                    </button>
                    <button type="button" id="reg-back-btn"
                        class="w-full border border-border py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors rounded-full">
                        Назад
                    </button>
                </form>
            </div>

            <!-- Step 3: OTP Verification -->
            <div data-step="3">
                <h2 class="font-title text-lg uppercase tracking-widest text-center mb-6 text-shiny">Подтверждение</h2>
                <p class="text-xs opacity-30 text-center mb-6">Код отправлен на <span id="otp-email-display" class="text-white/60"></span></p>
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Код из email</label>
                        <input id="reg-otp" type="text" placeholder="123456" maxlength="6"
                            class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl font-mono uppercase tracking-widest text-center text-lg">
                        <p id="otp-error" class="text-red-400 text-xs mt-1 hidden"></p>
                    </div>
                    <button id="reg-verify-btn"
                        class="w-full bg-white text-black py-3 text-[10px] uppercase tracking-widest font-bold rounded-full hover:scale-105 transition-transform disabled:opacity-30 disabled:hover:scale-100" disabled>
                        Подтвердить
                    </button>
                    <button id="reg-resend-btn"
                        class="w-full border border-border py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors rounded-full">
                        Отправить код повторно
                    </button>
                </div>
            </div>

            <!-- Step 4: Success -->
            <div data-step="4">
                <div class="text-center">
                    <div class="w-16 h-16 border border-white/20 rounded-2xl flex items-center justify-center mx-auto mb-6 bg-surface">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                    </div>
                    <h2 class="font-title text-lg uppercase tracking-widest mb-2 text-shiny">Готово</h2>
                    <p class="text-xs opacity-30 mb-6">Регистрация завершена</p>

                    <div id="invite-gen-section" class="mb-6">
                        <p class="text-xs uppercase tracking-widest text-gray-400 mb-3">Вы можете пригласить одного человека</p>
                        <button id="gen-invite-btn"
                            class="w-full border border-border py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors rounded-full mb-3">
                            Сгенерировать инвайт-код
                        </button>
                        <div id="generated-code-box" class="hidden">
                            <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">Ваш инвайт-код</p>
                            <p id="generated-code-value" class="invite-code-display text-white"></p>
                            <button id="copy-code-btn"
                                class="mt-3 text-[10px] uppercase tracking-widest border border-border px-4 py-2 bg-white/5 hover:bg-white/10 transition-colors rounded-full">
                                Скопировать
                            </button>
                        </div>
                    </div>

                    <a href="index.html"
                        class="inline-block w-full bg-white text-black py-3 text-[10px] uppercase tracking-widest font-bold rounded-full hover:scale-105 transition-transform text-center">
                        На главную
                    </a>
                </div>
            </div>
        </div>

        <!-- LOGIN PANEL -->
        <div id="panel-login" class="matte-card p-8 hidden">
            <h2 class="font-title text-lg uppercase tracking-widest text-center mb-6 text-shiny">Вход</h2>
            <form id="login-form" class="flex flex-col gap-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Email</label>
                    <input id="login-email" type="email" placeholder="you@example.com" required
                        class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 block">Пароль</label>
                    <input id="login-password" type="password" placeholder="Пароль" required
                        class="w-full bg-surface border border-border px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-white/50 transition-colors rounded-xl">
                </div>
                <p id="login-error" class="text-red-400 text-xs hidden"></p>
                <button type="submit"
                    class="w-full bg-white text-black py-3 text-[10px] uppercase tracking-widest font-bold rounded-full hover:scale-105 transition-transform">
                    Войти
                </button>
            </form>

            <!-- Logged-in account view -->
            <div id="account-view" class="hidden">
                <h2 class="font-title text-lg uppercase tracking-widest text-center mb-4 text-shiny">Аккаунт</h2>
                <p class="text-xs opacity-30 text-center mb-4"><span id="account-email"></span></p>
                <div id="account-verified" class="hidden mb-4">
                    <div id="account-no-invite" class="text-center">
                        <p class="text-xs uppercase tracking-widest text-gray-400 mb-3">Вы можете пригласить одного человека</p>
                        <button id="account-gen-invite"
                            class="w-full border border-border py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors rounded-full mb-3">
                            Сгенерировать инвайт-код
                        </button>
                    </div>
                    <div id="account-has-invite" class="hidden text-center">
                        <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">Ваш инвайт-код</p>
                        <p id="account-invite-code" class="invite-code-display text-white mb-2"></p>
                        <button id="account-copy-code"
                            class="text-[10px] uppercase tracking-widest border border-border px-4 py-2 bg-white/5 hover:bg-white/10 transition-colors rounded-full">
                            Скопировать
                        </button>
                    </div>
                </div>
                <div id="account-unverified" class="hidden mb-4 text-center">
                    <p class="text-xs opacity-30">Аккаунт не верифицирован. Обратитесь к администратору.</p>
                </div>
                <button id="account-logout"
                    class="w-full border border-border py-3 text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors rounded-full mt-4">
                    Выйти
                </button>
                <a href="index.html"
                    class="block w-full bg-white text-black py-3 text-[10px] uppercase tracking-widest font-bold rounded-full hover:scale-105 transition-transform text-center mt-3">
                    На главную
                </a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
